# https://eu5.paradoxwikis.com/Localization
l_simp_chinese:
  tiandao_character_modifier_interaction: "天道·角色修改器"
  tiandao_character_modifier_interaction_desc_specific: "#E 【$tiandao_character_modifier_interaction$】#!\n用于角色名字、昵称、军事、行政、外交的修改"
  tiandao_character_modifier_interaction_concept: "$tiandao_character_modifier_interaction$"
  tiandao_character_modifier_effect: "effect global_var:tiandao_current_target = { set_first_name = \"[GetVariableSystem.Get(\'input_first_name\')]\" set_nickname = \"[GetVariableSystem.Get(\'input_nickname\')]\" add_adm = -100 add_adm = [GetVariableSystem.Get(\'input_adm\')] add_dip = -100 add_dip = [GetVariableSystem.Get(\'input_dip\')] add_mil = -100 add_mil = [GetVariableSystem.Get(\'input_mil\')] }"
  tiandao_console_modifier_interaction: "天道·控制台修改器"
  tiandao_console_modifier_interaction_desc_specific: "#E 【$tiandao_console_modifier_interaction$】#!\n用于执行控制台命令"
  tiandao_console_modifier_interaction_concept: "$tiandao_console_modifier_interaction$"
  tiandao_console_modifier_effect: "[GetVariableSystem.Get(\'input_console\')]"
  tiandao_character_create_modifier_interaction: "天道·角色创建修改器"
  tiandao_character_create_modifier_interaction_desc_specific: "#E 【$tiandao_character_create_modifier_interaction$】#!\n用于角色的创建"
  tiandao_character_create_modifier_interaction_concept: "$tiandao_character_create_modifier_interaction$"
  tiandao_character_create_modifier_effect: "effect generate_character_create_effect = { age = \"[GetVariableSystem.Get(\'input_age\')]\" adm = \"[GetVariableSystem.Get(\'input_adm\')]\" mil = [GetVariableSystem.Get(\'input_mil\')] dip = [GetVariableSystem.Get(\'input_dip\')] dynasty = [GetVariableSystem.Get(\'input_dynasty\')] first_name = [GetVariableSystem.Get(\'input_first_name\')] }"
